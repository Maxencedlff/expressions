<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Maman l'a dit ou maman l'a pas dit ?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#fff9f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
h1{font-size:1.4rem;font-weight:800;color:#c0392b;text-align:center;margin-bottom:4px}
.subtitle{font-size:.85rem;color:#888;text-align:center;margin-bottom:24px}

/* Accueil */
#screen-home{display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px}
.emoji-big{font-size:4rem;margin-bottom:12px}
.btn-start{background:#c0392b;color:#fff;border:none;border-radius:16px;padding:18px;font-size:1.2rem;font-weight:700;cursor:pointer;margin-top:16px;width:100%}
.btn-start:active{background:#a93226}
.q-label{font-size:.85rem;color:#555;margin-top:20px;margin-bottom:8px;align-self:flex-start;font-weight:600}
.q-row{display:flex;gap:8px;width:100%}
.btn-q{flex:1;border:2px solid #c0392b;border-radius:12px;padding:11px 4px;font-size:.95rem;font-weight:600;cursor:pointer;background:#fff;color:#c0392b}
.btn-q.active{background:#c0392b;color:#fff}
.btn-list{background:#fff;color:#c0392b;border:2px solid #c0392b;border-radius:16px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
.btn-list:active{background:#fdecea}

/* Liste expressions */
#screen-list{display:none;flex-direction:column;align-items:flex-start;width:100%;max-width:400px}
.list-header{display:flex;align-items:center;gap:12px;width:100%;margin-bottom:16px}
.btn-back{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:4px}
.list-title{font-size:1.1rem;font-weight:800;color:#c0392b}
.expr-list{width:100%;list-style:none}
.expr-item{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);font-size:.95rem;line-height:1.4}
.expr-item .tag{font-size:.7rem;font-weight:700;border-radius:8px;padding:2px 7px;margin-left:8px;vertical-align:middle}
.tag-maman{background:#fdecea;color:#c0392b}
.tag-amelie{background:#eaf4fb;color:#2980b9}

/* Quiz */
#screen-quiz{display:none;flex-direction:column;align-items:center;width:100%;max-width:400px}
.hud{display:flex;justify-content:space-between;width:100%;margin-bottom:16px;font-size:.9rem;color:#555;font-weight:600}
.hud span b{color:#c0392b}
.card{background:#fff;border-radius:24px;box-shadow:0 4px 24px rgba(0,0,0,.1);padding:32px 24px;width:100%;min-height:200px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:1.15rem;font-weight:600;color:#222;line-height:1.5;margin-bottom:28px;position:relative}
.card .num{position:absolute;top:12px;right:16px;font-size:.75rem;color:#bbb;font-weight:400}
.btns{display:flex;flex-direction:column;gap:12px;width:100%}
.btn-oui{background:#27ae60;color:#fff;border:none;border-radius:16px;padding:20px;font-size:1.1rem;font-weight:700;cursor:pointer}
.btn-non{background:#e74c3c;color:#fff;border:none;border-radius:16px;padding:20px;font-size:1.1rem;font-weight:700;cursor:pointer}
.btn-oui:active{background:#1e8449}
.btn-non:active{background:#c0392b}

/* Feedback plein écran */
#screen-feedback{display:none;position:fixed;top:0;left:0;right:0;bottom:0;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100}
#screen-feedback.ok{background:#27ae60}
#screen-feedback.ko{background:#e74c3c}
.fb-emoji{font-size:5rem}
.fb-label{font-size:1.6rem;font-weight:800;color:#fff}
.fb-reveal{font-size:1rem;color:rgba(255,255,255,.85);font-weight:600;text-align:center;padding:0 32px;line-height:1.5}

/* Résultats */
#screen-results{display:none;flex-direction:column;align-items:center;width:100%;max-width:400px}
.score-final{font-size:3rem;font-weight:800;color:#c0392b;margin:8px 0}
.btn-restart{background:#c0392b;color:#fff;border:none;border-radius:16px;padding:16px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;margin-top:16px}
.btn-restart:active{background:#a93226}
</style>
</head>
<body>

<!-- ACCUEIL -->
<div id="screen-home">
  <div class="emoji-big">👩‍👧‍👦</div>
  <h1>Maman l'a dit ou<br>maman l'a pas dit ?</h1>
  <p class="subtitle">Vraie expression ou inventée ?</p>
  <p class="q-label">Nombre de questions</p>
  <div class="q-row">
    <button class="btn-q" data-n="10">10</button>
    <button class="btn-q active" data-n="20">20</button>
    <button class="btn-q" data-n="30">30</button>
    <button class="btn-q" data-n="0">Toutes</button>
  </div>
  <button class="btn-start" id="btn-start">Commencer</button>
  <button class="btn-list" id="btn-list">📋 Voir toutes les expressions</button>
</div>

<!-- LISTE -->
<div id="screen-list">
  <div class="list-header">
    <button class="btn-back" id="btn-back">←</button>
    <span class="list-title">Toutes les expressions</span>
  </div>
  <ul class="expr-list" id="expr-list"></ul>
</div>

<!-- QUIZ -->
<div id="screen-quiz">
  <div class="hud">
    <span>Question <b id="q-num">1</b>/<b id="q-total">20</b></span>
    <span>Score <b id="score-cur">0</b></span>
  </div>
  <div class="card">
    <span class="num" id="q-label"></span>
    <span id="expr-text"></span>
  </div>
  <div class="btns">
    <button class="btn-oui" id="btn-oui">✅ Maman l'a dit !</button>
    <button class="btn-non" id="btn-non">❌ Maman l'a pas dit</button>
  </div>
</div>

<!-- FEEDBACK -->
<div id="screen-feedback">
  <div class="fb-emoji" id="fb-emoji"></div>
  <div class="fb-label" id="fb-label"></div>
  <div class="fb-reveal" id="fb-reveal"></div>
</div>

<!-- RÉSULTATS -->
<div id="screen-results">
  <div class="emoji-big">🏆</div>
  <h1>Score final</h1>
  <div class="score-final" id="score-final"></div>
  <p class="subtitle" id="score-sub"></p>
  <button class="btn-restart" id="btn-restart">Rejouer</button>
</div>

<script>

  "Motif impérial familieux",

  "Il lui a donné une chevillère rotulienne",
  "Pourquoi on a pas de lunettes ?",
  "Tu veux qu'on lessive les escargots ?",
  "Tu veux le Billy killer ce soir ?",

  "Qui a piché ma pok ?",
  "Je pas cuis le coisson encore !",
  "Combien de temps de reste sur la machine à chemise ?",
  "Un bon bien chaud…",
  "On peut avoir de la bouteille dans l'eau ?",

  "Tu as mis combien de temps pour aller à la Victoire demain ?",
  "Chaîne wifi",
  "Il faut mettre un déodorisant dans le frigidaire",

  {text: "Y'a pas besoin d'avion pour prendre le permis", real: false, author: "Amélie"},
  {text: "Tu peux avoir de la fatigue de fièvre", real: false, author: "Amélie"},
  {text: "Son hôtel de 10 niveau ville", real: false, author: "Amélie"},
  {text: "C'est la charité qui se fout de l'hôpital", real: false, author: "Amélie"},
  {text: "Il est resté 5 minutes avec elle et il a même pas demandé un orthographe", real: false, author: "Amélie"},
  {text: "Le cuiso de la fuiguine", real: false, author: "Amélie"},
  {text: "Il fait la taille 3 fois ma tête", real: false, author: "Amélie"},
  {text: "La mousquitaire", real: false, author: "Amélie"}
];

const FAUSSES = [
  "Passe moi le fromage de la douche",
  "Il a mis ses chaussettes au four",
  "Tu as éteint la télé du jardin ?",
  "Le chat a encore bu la sonnette",
  "Remets le canapé dans le lave-vaisselle",
  "C'est qui qui a rangé le garage dans le frigo ?",
  "Tu peux baisser le volume du soleil ?",
  "Il a garé sa fourchette dans le couloir",
  "J'ai repassé les rideaux avec le grille-pain",
  "Pourquoi t'as mis tes devoirs dans la poubelle à vélo ?",
  "Le chien a encore pris une douche dans la voiture",
  "Tu peux me passer le stylo de la cuisine ?",
  "J'ai mis les courses dans le lave-linge",
  "Il avait mis ses clés dans la piscine",
  "C'est qui qui a planté le téléphone dans le jardin ?",
  "Tu as vu mon pull dans le congélateur ?",
  "Remets les lunettes sur la table du garage",
  "T'as rangé le balai dans le micro-ondes ?",
  "Il faut mettre les assiettes à charger",
  "Tu peux allumer la télé du placard ?",
  "J'ai semé mes chaussures dans l'escalier",
  "Le vélo a encore sonné deux fois",
  "Passe moi le sucre qui est dans la salle de bain",
  "Il a lavé sa veste avec le fer à repasser",

  "J'ai mis le dentifrice dans le frigo pour le garder frais",
  "Le robinet fait encore ce bruit de voiture",
  "T'as vu, j'ai peint le canapé en propre !",
  "Il a mis ses devoirs au congélateur pour les garder",
  "Tu peux boire ta fourchette doucement ?",
  "J'ai garé mon manteau sous la table",
  "C'est qui qui a rangé le soleil derrière le garage ?",
  "Passe moi la télécommande de la cuisine",
  "Il faut que j'aille mettre les enfants à l'aspirateur",
  "T'as vu mes clés dans le lave-vaisselle ?",
  "Le frigo a encore appelé pendant qu'on mangeait",
  "Remets les chaussettes dans le tiroir du jardin",
  "T'as éteint la lumière de la voiture ?",
  "J'ai oublié mes lunettes dans la poubelle",
  "Il a mis du beurre sur la télécommande",
  "Tu peux aller chercher le manteau de la cave à vélo ?",
  "Il faut qu'on repeigne le plancher du toit",
  "T'as vu, il a rangé ses affaires dans le robinet !",
  "J'ai mis la nappe à recharger",
  "Tu peux éteindre le jardin avant de dormir ?",
  "Remets le parapluie dans le réfrigérateur",
  "Il a branché son cartable cette nuit",
  "T'as mis combien de temps pour rentrer depuis demain ?",
  "J'ai repassé mes dents ce matin",
  "Tu peux mettre les couverts à sécher dehors ?"
];

// ── État ──
let score, qIndex, questions, locked, selectedQ = 20;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildQuestions(n){
  const allV = shuffle(VRAIES);
  const allF = shuffle(FAUSSES);
  const half = n === 0 ? Math.min(allV.length, allF.length) : Math.floor(n/2);
  const v = allV.slice(0, half);
  const f = allF.slice(0, n === 0 ? half : n - half);
  return shuffle([
    ...v.map(t=> typeof t === 'string' ? {text:t, real:true} : {text:t.text, real: t.real ?? true, author:t.author}),
    ...f.map(t=>({text:t, real:false}))
  ]);
}

// ── Écrans ──
const $home = document.getElementById('screen-home');
const $list = document.getElementById('screen-list');
const $quiz = document.getElementById('screen-quiz');
const $fb   = document.getElementById('screen-feedback');
const $res  = document.getElementById('screen-results');

function show(el){[$home,$list,$quiz,$fb,$res].forEach(e=>e.style.display='none');el.style.display='flex';}

// ── Sélecteur nb questions ──
document.querySelector('.q-row').addEventListener('click', e=>{
  const btn = e.target.closest('.btn-q');
  if(!btn) return;
  selectedQ = +btn.dataset.n;
  document.querySelectorAll('.btn-q').forEach(b=>b.classList.toggle('active', b===btn));
});

document.getElementById('btn-start').addEventListener('click', startGame);

// ── Liste des expressions ──
document.getElementById('btn-list').addEventListener('click', ()=>{
  const ul = document.getElementById('expr-list');
  ul.innerHTML = VRAIES.map(t=>{
    const text   = typeof t === 'string' ? t : t.text;
    const author = typeof t === 'object' && t.author ? t.author : null;
    const tag    = author
      ? `<span class="tag tag-amelie">${author}</span>`
      : `<span class="tag tag-maman">Maman</span>`;
    return `<li class="expr-item">${text}${tag}</li>`;
  }).join('');
  show($list);
});

document.getElementById('btn-back').addEventListener('click', ()=>show($home));

function startGame(){
  score = 0; qIndex = 0; locked = false;
  questions = buildQuestions(selectedQ);
  document.getElementById('q-total').textContent = questions.length;
  show($quiz);
  showQuestion();
}

function showQuestion(){
  if(qIndex >= questions.length){ endGame(); return; }
  locked = false;
  const q = questions[qIndex];
  document.getElementById('q-num').textContent     = qIndex+1;
  document.getElementById('expr-text').textContent = q.text;
  document.getElementById('score-cur').textContent = score;
}

function answer(isReal){
  if(locked) return;
  locked = true;
  const q  = questions[qIndex];
  const ok = (isReal === q.real);
  if(ok) score++;
  qIndex++;
  showFeedback(ok, q);
}

function showFeedback(ok, q){
  $fb.className = ok ? 'ok' : 'ko';
  document.getElementById('fb-emoji').textContent = ok ? '✅' : '❌';
  document.getElementById('fb-label').textContent = ok ? 'Bonne réponse !' : 'Raté !';
  const isRealExpr = q.real || !!q.author;
  const vraiLabel  = isRealExpr ? '✔ Vrai !' : '✘ Faux !';
  const who        = q.real    ? '👩 Maman l\'a dit !'
                   : q.author  ? `👧 C'est ${q.author} qui l'a dit !`
                   :             '🙅 Personne n\'a dit ça !';
  document.getElementById('fb-reveal').innerHTML = `<strong>${vraiLabel}</strong><br>${who}`;
  show($fb);
  setTimeout(()=>{ show($quiz); showQuestion(); }, 1800);
}

document.getElementById('btn-oui').addEventListener('click', ()=>answer(true));
document.getElementById('btn-non').addEventListener('click', ()=>answer(false));
document.getElementById('btn-restart').addEventListener('click', ()=>show($home));

function endGame(){
  show($res);
  const total = questions.length;
  document.getElementById('score-final').textContent = `${score} / ${total}`;
  const pct = score/total;
  const msg = pct >= .9 ? 'Tu connais maman par cœur ! 🌟'
            : pct >= .7 ? 'Très bon score ! 👏'
            : pct >= .5 ? 'Pas mal du tout !'
            : 'Maman te surprend encore… 😄';
  document.getElementById('score-sub').textContent = msg;
}
</script>
</body>
</html>
